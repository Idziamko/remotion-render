name: Render Video

on:
  # Автоматический рендер при изменении Video.tsx
  push:
    paths:
      - 'src/Video.tsx'
      - 'src/Root.tsx'
  # Ручной запуск через кнопку "Run workflow"
  workflow_dispatch:
    inputs:
      filename:
        description: 'Имя выходного файла (без .mp4)'
        required: false
        default: 'video'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Render video
        run: npx remotion render Video "${{ inputs.filename || 'video' }}.mp4"

      - name: Upload mp4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.filename || 'video' }}
          path: ${{ inputs.filename || 'video' }}.mp4
          retention-days: 30
